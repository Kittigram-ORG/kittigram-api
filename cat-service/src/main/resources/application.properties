# JWT
mp.jwt.verify.issuer=https://kittigram.ciscoadiz.org
mp.jwt.verify.publickey.location=publicKey.pem

# HTTP
quarkus.http.port=8084

# Base de datos
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:kittigram}
quarkus.datasource.password=${DB_PASSWORD:kittigram}
quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kittigram}?search_path=cats

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

# REST client hacia storage-service
quarkus.rest-client.storage-service.url=${STORAGE_SERVICE_URL:http://localhost:8083}



# Container image
quarkus.container-image.builder=jib
quarkus.container-image.group=ciscoadiz
quarkus.container-image.name=cat-service
quarkus.container-image.tag=latest